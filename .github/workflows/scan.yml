name: Options Scan

on:
  # Run automatically on a schedule (UTC). 13:45 UTC ≈ 9:45 AM ET,
  # ~15 min after the US market opens. GitHub cron is UTC only and
  # does not adjust for daylight saving — shift by an hour if needed.
  schedule:
    - cron: "45 13 * * 1-5"   # Mon–Fri
  # Also let you trigger it by hand from the Actions tab.
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: |
          mkdir -p results
          DATE="$(date -u +%Y-%m-%d)"
          OUT="results/scan-$DATE.csv"
          SUM="results/scan-$DATE.md"
          # yfinance scrapes Yahoo, whose servers sometimes block GitHub's
          # shared IPs. Retry a few times before giving up.
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            if python options_scanner.py \
                 --watchlist watchlist.txt \
                 --side both --max-dte 45 --top 15 \
                 --csv "$OUT" --summary "$SUM"; then
              echo "Scanner finished."
              break
            fi
            echo "Attempt $attempt failed; waiting 30s..."
            sleep 30
          done
          # Ensure a file always exists so later steps don't error.
          [ -f "$OUT" ] || echo "scan_utc" > "$OUT"

      - name: Commit results back to the repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          # Nothing to commit? Exit cleanly.
          if git diff --staged --quiet; then
            echo "No new results to commit."
            exit 0
          fi
          git commit -m "Scan results $(date -u +%Y-%m-%d %H:%M UTC)"
          # If main moved while we were running (e.g. you pushed an edit),
          # rebase on top of it and retry the push a few times.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed results."
              exit 0
            fi
            echo "Push rejected; pulling latest and retrying..."
            git pull --rebase origin main || true
          done
          echo "Could not push after retries."
          exit 1
